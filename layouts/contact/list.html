{{ define "main" }}
<div style="max-width:680px; margin:0 auto; padding:3rem 2rem;">
  <p style="font-size:1.05rem; color:#64748b; margin-bottom:2rem; line-height:1.7;">Have a question, partnership inquiry, or want to learn more about contributing to AppliedAM? We read every message and will get back to you within 2 business days.</p>
  <form action="https://formspree.io/f/xzdqlvlv" method="POST"><input type="hidden" name="_next" value="https://appliedam.net/contact/thanks/" style="display:flex; flex-direction:column; gap:1.25rem;">
    <div><label style="display:block; font-size:0.875rem; font-weight:600; color:#1a1a2e; margin-bottom:6px;">Full Name</label><input type="text" name="name" required placeholder="Your full name" style="width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:15px; font-family:Inter,sans-serif; box-sizing:border-box;"></div>
    <div><label style="display:block; font-size:0.875rem; font-weight:600; color:#1a1a2e; margin-bottom:6px;">Email Address</label><input type="email" name="email" required placeholder="your@email.com" style="width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:15px; font-family:Inter,sans-serif; box-sizing:border-box;"></div>
    <div><label style="display:block; font-size:0.875rem; font-weight:600; color:#1a1a2e; margin-bottom:6px;">Subject</label><select name="subject" required style="width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:15px; font-family:Inter,sans-serif; background:#fff; box-sizing:border-box;"><option value="" disabled selected>Select a subject</option><option value="General Inquiry">General Inquiry</option><option value="Submission Question">Submission Question</option><option value="Partnership">Partnership</option><option value="Press">Press</option><option value="Other">Other</option></select></div>
    <div><label style="display:block; font-size:0.875rem; font-weight:600; color:#1a1a2e; margin-bottom:6px;">Message</label><textarea name="message" required rows="6" placeholder="Tell us what is on your mind..." style="width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:15px; font-family:Inter,sans-serif; resize:vertical; box-sizing:border-box;"></textarea></div>
    <div><button type="submit" style="background:#0077ff; color:#fff; border:none; padding:12px 32px; border-radius:8px; font-size:15px; font-weight:600; font-family:Inter,sans-serif; cursor:pointer;">Send Message</button></div>
  </form>
  <div style="margin-top:3rem; padding-top:2rem; border-top:1px solid #e2e8f0;"><p style="font-size:0.875rem; color:#64748b;">You can also reach us directly at <a href="mailto:submit@appliedam.net" style="color:#0077ff;">submit@appliedam.net</a></p></div>
</div>
{{ end }}
