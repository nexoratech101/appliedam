{{ define "header" }}
<nav style="background:#0d0d1a; padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:68px; position:sticky; top:0; z-index:100; border-bottom:1px solid rgba(255,255,255,0.07);">

  <a href="/" style="display:flex; align-items:center; text-decoration:none;">
    <img src="/images/ChatGPT_Image_Jun_9__2026__09_13_06_PM.png" alt="AppliedAM" style="height:52px; width:auto;">
  </a>

  <div style="display:flex; align-items:center; gap:0.25rem;">
    {{ range .Site.Menus.main }}
    {{ if ne .Name "Submit a Project" }}
    <a href="{{ .URL }}"
       style="color:rgba(255,255,255,0.75); font-family:'Inter',sans-serif; font-size:0.875rem; font-weight:500; padding:0.4rem 0.85rem; border-radius:6px; text-decoration:none;"
       onmouseover="this.style.color='#fff';this.style.background='rgba(255,255,255,0.08)'"
       onmouseout="this.style.color='rgba(255,255,255,0.75)';this.style.background='transparent'">
      {{ .Name }}
    </a>
    {{ end }}
    {{ end }}
    <a href="/submit/"
       style="background:#0077ff; color:#fff; font-family:'Inter',sans-serif; font-size:0.875rem; font-weight:600; padding:0.45rem 1.1rem; border-radius:6px; text-decoration:none; margin-left:0.75rem;">
      Submit Project
    </a>
  </div>

</nav>
{{ end }}
